<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Buton Paneli</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
  }

  body {
    background-color: #202020;
    font-family: Arial, sans-serif;
    color: #eee;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #panel {
    width: 100%;
    height: 100%;
    background-color: #2b2b2b;
    border: 1px solid #555;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  /* Üst ve orta buton grupları */
  #topGroups {
    display: flex;
    gap: 10px;
    flex: 1 1 auto; /* kalan alanı kaplasın */
    align-items: stretch;
  }

  .group {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    align-content: stretch;
  }

  #orangeGroup {
    margin-top: 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    justify-content: center;
    flex: 1 1 auto; /* otomatik büyüsün */
    align-content: stretch;
  }

  /* Genel buton stili */
  button {
    flex: 1 1 auto;  /* butonlar satır yüksekliğine uyumlu */
    min-width: 50px;
    padding: 6px;
    border: none;
    border-radius: 8px;
    color: #f0f0f0;
    cursor: pointer;
    font-weight: bold;
    background-color: #3b3b3b;
    transition: background-color 0.15s, transform 0.1s;
	font-size: 22px;
  }

  button:hover {
    transform: scale(1.05);
  }

  /* Mat buton renkleri */
  .gray  { background-color: #656666; }
  .gray:hover  { background-color: #9a9b9c; }

  .green { background-color: #3f5a47; }
  .green:hover { background-color: #4f6a56; }

  .brown { background-color: #63472e; }
  .brown:hover { background-color: #826851; }

  .blueBt { background-color: #395e6b; }
  .blueBt:hover { background-color: #5a8899; }

  .orangeBtn { background-color: #6c4b2e; }
  .orangeBtn:hover { background-color: #7a5b3a; }

  /* Alt bölüm */
  #bottom {
    display: flex;
    margin-top: 10px;
    gap: 6px;
    flex: 0 0 auto; /* sabit yüksekliğe uyumlu */
  }

  textarea {
    height: 200px; 
    width: 100%;
    background-color: #1c1c1c;
    color: #fff;
    border: 1px solid #555;
    border-radius: 8px;
    padding: 6px;
    resize: none;
    font-size: 14px;
    box-sizing: border-box;
  }

  #sideButtons {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  #sideButtons button {
    padding: 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    color: white;
    font-weight: bold;
    flex: 1 1 auto;
  }

  #copy { background-color: #456a50; }
  #back { background-color: #6a5a40; }
  #del  { background-color: #6a4040; }
  #sent { background-color: #40506a; }

  #sideButtons button:hover {
    opacity: 0.85;
  }
</style>
</head>
<body>

<div id="panel">
  <div id="topGroups">
    <div class="group" id="grayGroup"></div>
    <div class="group" id="greenGroup"></div>
    <div class="group" id="brownGroup"></div>
  </div>

  <div id="orangeGroup"></div>

  <div id="bottom">
    <textarea id="ta_medi"></textarea>
    <div id="sideButtons">
      <button id="copy">Copy</button>
      <button id="back">Back</button>
      <button id="del">Del</button>
      <button id="sent">Add</button>
    </div>
  </div>
</div>

<script>
const ta = document.getElementById("ta_medi");

/* --- Buton grupları --- */
const buttons = {
  gray:  ["1","2","3","4","5","7","10","12","15","100","250","300","500","1000","2000"],
  green: ["amp","U","mg","cc","SF","%5 Dx","%3", "0,45"],
  brown: ["IM", "IV", "inf", "inh", "PO", "+",","],
  orange: ["avil","beloc","combivent","cordarone","coraspirin", "decort","desal","diazem","diltizem", "dormicum", "esmelol", "K-vit","keppra", "depakin", "fenitoin", "krs.insülin","metpamid","pantpas","perlinganit","tetanoz", "NaHCO3","ventolin", "zofran"]
};

/* --- Butonları oluştur --- */
Object.entries(buttons).forEach(([color, items]) => {
  const group = document.getElementById(color + "Group") || document.getElementById("orangeGroup");
  items.forEach(label => {
    const b = document.createElement("button");
    b.textContent = label;
    b.classList.add(color === "orange" ? "blueBt" : color);
    b.addEventListener("click", () => {
      ta.value += (ta.value ? " " : "") + label;
    });
    group.appendChild(b);
  });
});

/* --- Alt butonlar --- */
document.getElementById("copy").addEventListener("click", () => {
  const val = ta.value;
  sessionStorage.setItem("med_tedavi", val);
  ta.select();
  document.execCommand("copy");
});

document.getElementById("del").addEventListener("click", () => {
  ta.value = "";
});

/* Virgüle kadar silme */
document.getElementById("back").addEventListener("click", () => {
  let val = ta.value.trim();
  if (!val) return;
  const lastComma = val.lastIndexOf(",");
  if (lastComma === -1) ta.value = "";
  else ta.value = val.substring(0, lastComma).trim();
});

document.getElementById("sent").addEventListener("click", () => {
  // Cihaz kontrolü
  const userAgent = navigator.userAgent.toLowerCase();
  const isAndroid = userAgent.includes('android');
  
  if (isAndroid) {
    localStorage.setItem('med_tedavi', ta.value);
	window.location.href = "../Cnut_Android.html";
  } else { // windows cihaz ise
	localStorage.setItem('med_tedavi', ta.value);
	localStorage.setItem('hideMedDiv', 'true');// iframe içinden, ana sayfadaki 'div' öğesini gizleme
        setTimeout(() => {
            history.back(); // bir önceki sayfaya güvenli geri dönüş
        }, 100); // küçük gecikme ile localStorage'ın kaydedilmesini garanti et
	 console.log("sent med.tedavi");
  }
 
});
</script>

</body>
</html>
